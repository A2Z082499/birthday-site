<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎂</title>

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      text-align: center;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 2.5em;
      font-weight: 600;
      text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Button */
    button {
      margin-top: 25px;
      padding: 14px 25px;
      font-size: 16px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(45deg, #ff6f61, #ff3b2e);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    /* POPUP */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.5s ease;
    }

    .popup-content {
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: pop 0.5s ease;
    }

    /* Floating Image */
    .popup img {
      width: 220px;
      border-radius: 15px;
      animation: float 3s ease-in-out infinite;
    }

    .message {
      margin-top: 15px;
      font-size: 1.2em;
      color: white;
    }

    .close {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      background: linear-gradient(45deg, #ff6f61, #ff3b2e);
      color: white;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Animations */
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Mobile */
    @media (max-width: 480px) {
      h1 {
        font-size: 2em;
      }

      .popup img {
        width: 180px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎉 お誕生日おめでとう！🎂</h1>
    <button onclick="openPopup()">🎁</button>
  </div>

  <!-- POPUP -->
  <div class="popup" id="popup">
    <div class="popup-content">
      <img src="hnaa/hana1.png" alt="Birthday">
      <div class="message">
  🎈 Cheers to you for another trip around the sun! 🍰<br><br>
  Happy Birthday, may all your dreams come true.<br><br>
  God bless you, more birthdays to come.<br><br>
  From the cutest person in the room <br>
  - mesh
</div>
      <button class="close" onclick="closePopup()">Close</button>
    </div>
  </div>

  <script>
    function openPopup() {
      document.getElementById("popup").style.display = "flex";

      // Confetti burst
      confetti({
        particleCount: 180,
        spread: 120,
        origin: { y: 0.6 }
      });

      // Soft falling confetti
      let duration = 2 * 1000;
      let end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 3,
          angle: 60,
          spread: 60,
          origin: { x: 0 }
        });
        confetti({
          particleCount: 3,
          angle: 120,
          spread: 60,
          origin: { x: 1 }
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
